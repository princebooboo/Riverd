<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Riverd</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --felt-dark: #0b1f17;
    --felt: #123524;
    --felt-light: #1a4632;
    --gold: #c9a45c;
    --gold-bright: #e0bd76;
    --cream: #f3ede0;
    --text-dim: #8fa396;
    --red: #b8543f;
    --green-win: #5a9e6f;
    --card-bg: #fbf8f2;
    --border-soft: rgba(201,164,92,0.18);
  }

  html, body {
    background: var(--felt-dark);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    height: 100%;
    overflow-x: hidden;
  }

  #root { min-height: 100vh; }

  /* ===== SETUP SCREEN ===== */
  .setup-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    background: radial-gradient(circle at 50% 0%, var(--felt-light) 0%, var(--felt-dark) 70%);
  }

  .setup-logo {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 42px;
    letter-spacing: -1px;
    color: var(--gold-bright);
    margin-bottom: 4px;
  }

  .setup-tagline {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .setup-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-soft);
    border-radius: 16px;
    padding: 28px 24px;
    width: 100%;
    max-width: 380px;
  }

  .setup-label {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    display: block;
  }

  .setup-input {
    width: 100%;
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--cream);
    font-size: 15px;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 20px;
    outline: none;
  }
  .setup-input:focus { border-color: var(--gold); }
  .setup-input::placeholder { color: rgba(255,255,255,0.25); }

  .setup-note {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .setup-btn {
    width: 100%;
    background: var(--gold);
    color: #1a1208;
    border: none;
    border-radius: 10px;
    padding: 15px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .setup-btn:disabled { opacity: 0.4; }
  .setup-btn:active { transform: scale(0.98); }

  .setup-error {
    color: var(--red);
    font-size: 13px;
    margin-top: 12px;
    text-align: center;
  }

  /* ===== MAIN APP ===== */
  .app-shell {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--felt-dark);
    border-bottom: 1px solid var(--border-soft);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topbar-brand {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 19px;
    color: var(--gold-bright);
  }

  .topbar-stack {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--cream);
  }

  .topbar-stack span {
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 400;
    margin-right: 6px;
  }

  .topbar-btn {
    background: none;
    border: 1px solid var(--border-soft);
    color: var(--text-dim);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 11px;
    font-family: 'Inter', sans-serif;
  }

  .scroll-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 140px;
  }

  /* Loading state */
  .loading-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 14px;
    gap: 14px;
  }

  .spinner {
    width: 28px; height: 28px;
    border: 2.5px solid var(--border-soft);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Table setup display */
  .hand-banner {
    text-align: center;
    padding: 10px 0 18px;
  }
  .hand-banner-num {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
  }
  .hand-banner-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .players-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 18px;
    font-size: 13px;
  }
  .players-table th {
    text-align: left;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    padding: 0 8px 8px 0;
    font-weight: 600;
    border-bottom: 1px solid var(--border-soft);
  }
  .players-table td {
    padding: 9px 8px 9px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .players-table tr.hero-row td { color: var(--gold-bright); font-weight: 600; }
  .players-table .stack-cell { font-family: 'JetBrains Mono', monospace; color: var(--cream); }
  .players-table .read-cell { color: var(--text-dim); font-size: 11.5px; font-style: italic; }

  /* Street block */
  .street-block {
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
  }

  .street-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }
  .street-name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--gold-bright);
  }
  .street-pot {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
  }

  .board-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .play-card {
    background: var(--card-bg);
    border-radius: 6px;
    padding: 6px 9px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
    box-shadow: 0 2px 5px rgba(0,0,0,0.35);
    min-width: 34px;
    text-align: center;
  }
  .play-card.red { color: var(--red); }
  .play-card.placeholder {
    background: rgba(255,255,255,0.05);
    border: 1.5px dashed rgba(255,255,255,0.15);
    color: transparent;
    box-shadow: none;
  }

  .action-list { display: flex; flex-direction: column; gap: 0; }
  .action-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 13.5px;
  }
  .action-row:last-child { border-bottom: none; }
  .action-row .pname { color: var(--cream); }
  .action-row .pname.hero { color: var(--gold-bright); font-weight: 600; }
  .action-row .pstack { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); margin-left: 8px; }
  .action-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 5px;
    letter-spacing: 0.5px;
  }
  .action-tag.fold { background: rgba(255,255,255,0.06); color: var(--text-dim); }
  .action-tag.check { background: rgba(255,255,255,0.06); color: #b8c2bc; }
  .action-tag.call { background: rgba(90,158,111,0.16); color: var(--green-win); }
  .action-tag.bet, .action-tag.raise, .action-tag.allin { background: rgba(201,164,92,0.18); color: var(--gold-bright); }
  .action-tag.pending { background: transparent; color: var(--text-dim); border: 1px dashed var(--border-soft); }

  .to-call-line {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--gold-bright);
    text-align: center;
  }

  /* Debrief */
  .debrief-card {
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .debrief-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 18px;
    color: var(--gold-bright);
    margin-bottom: 14px;
  }
  .debrief-body {
    font-size: 14px;
    line-height: 1.65;
    color: #d6cfc0;
    white-space: pre-wrap;
  }
  .debrief-body strong { color: var(--gold-bright); }

  /* Bottom action bar */
  .action-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(180deg, rgba(11,31,23,0) 0%, var(--felt-dark) 25%);
    padding: 14px 16px 22px;
    z-index: 20;
  }

  .quick-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .qa-btn {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border-soft);
    color: var(--cream);
    border-radius: 10px;
    padding: 13px 8px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
  }
  .qa-btn.fold { color: var(--text-dim); }
  .qa-btn.call { color: var(--green-win); border-color: rgba(90,158,111,0.3); }
  .qa-btn:active { transform: scale(0.96); }

  .raise-row {
    display: flex;
    gap: 8px;
  }
  .raise-input {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    padding: 13px 14px;
    color: var(--cream);
    font-size: 15px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
  }
  .raise-input:focus { border-color: var(--gold); }
  .raise-btn {
    background: var(--gold);
    color: #1a1208;
    border: none;
    border-radius: 10px;
    padding: 13px 22px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
  }
  .raise-btn:active { transform: scale(0.96); }

  .continue-btn {
    width: 100%;
    background: var(--gold);
    color: #1a1208;
    border: none;
    border-radius: 10px;
    padding: 15px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
  }
  .continue-btn:active { transform: scale(0.98); }

  .session-summary {
    display: flex;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(255,255,255,0.025);
    border-radius: 12px;
    margin-bottom: 14px;
    border: 1px solid var(--border-soft);
  }
  .ss-item { text-align: center; flex: 1; }
  .ss-label { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); }
  .ss-val { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--cream); margin-top: 3px; }

  .leak-table { width: 100%; font-size: 12.5px; margin-top: 10px; }
  .leak-table td { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--cream); }
  .leak-table td:last-child { text-align: right; font-family: 'JetBrains Mono', monospace; color: var(--red); }

  .api-note {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    padding: 8px 0 0;
  }

  textarea.raw-input {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    padding: 13px 14px;
    color: var(--cream);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    resize: none;
    min-height: 46px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect, useCallback } = React;

const SYSTEM_PROMPT = `You are running a live poker simulation called Riverd. The user is the player (Hero). You control everything else — the table, the opponents, the cards, the action, and the post-hand coaching.

## SETTING
- Casino: Wynn Las Vegas poker room
- Stakes: $2/$5 NL Hold'em
- Time: 7:00 PM, Tuesday, average weeknight
- Players: 8 (Hero + 7 opponents)
- Hero starting stack: $1,000

## OUTPUT FORMAT — CRITICAL
You must ALWAYS respond with a single valid JSON object and nothing else. No markdown, no prose outside the JSON, no code fences. The JSON has this shape:

{
  "screen": "table_setup" | "hand_action" | "debrief" | "rebuy_prompt",
  "hand_number": number,
  "street": "preflop" | "flop" | "turn" | "river" | "showdown",
  "pot": number,
  "board": ["string array of cards already revealed, e.g. ['A♠','K♦','7♣']"],
  "hero_cards": ["string array of 2 cards"],
  "players": [
    {"name": "string", "position": "string", "stack": number, "is_hero": boolean, "action": "string or null if not yet acted this street", "read": "string, only on table_setup screen, else omit"}
  ],
  "to_call": number,
  "awaiting_hero": boolean,
  "debrief_text": "string, only present when screen is debrief — full formatted debrief as plain text with line breaks, NOT markdown headers, use simple CAPS LINE labels like HAND SUMMARY then a blank line then content",
  "leak_tracker": [{"leak": "string", "occurrences": number, "cost": "string like ~$40"}],
  "hero_stack": number,
  "net_result": number,
  "message": "string, short status text shown to user, e.g. 'Your turn. Pot: $47. To call: $20.' or 'Hand complete.' or for rebuy_prompt: 'You busted. How much do you want to rebuy? Table max $1,000.'"
}

Rules for this JSON:
- "players" array should ONLY include players whose action is relevant to display right now, in seating order. Once stop-at-hero rule applies, players after hero show action: null.
- On "hand_action" screens, always include the FULL current board reveal so far, hero_cards, and the players list with actions resolved up to (but not past) hero's turn.
- On "debrief" screen, set awaiting_hero to false, and put the complete coaching text in debrief_text.
- Never include any text outside the JSON object. Your entire response must be parseable by JSON.parse().

## TABLE SETUP
On the first turn, generate 7 opponents and assign seats. Composition rules:
- Maximum 2 loose/sticky players (calling station, splashy, maniac)
- Minimum 2 tight players (nit, TAG)
- At least 1 reg who folds correctly to pressure
- Stacks range $300-$1,000
- Each opponent has hidden tendencies you track internally (archetype, vpip, pfr, exact frequencies) but NEVER reveal in output except the one-line "read" field which is only observable behavior (clothing, demeanor, chip handling) — never hidden info.

CRITICAL: table setup and dealing Hand 1 happen in the SAME response. Never send a response that only shows the table with no hero decision available. Immediately after assigning seats, deal Hand 1's hole cards and resolve any preflop action by players before hero's turn, then set screen to "hand_action" with awaiting_hero: true and to_call populated. The user must always have either action buttons (awaiting_hero: true) or a "Deal next hand" button (screen: debrief) available after every single response — never a dead end with no possible action.

## HOLE CARD DEALING RULES
- Deal all cards including full board at hand start internally, reveal only what street requires
- Hero cards dealt randomly with no bias
- Roughly 1 in 5 hands: clear preflop garbage hand (72o, 83o, J4o etc) for hero
- Other 4 in 5: playable hand with a real decision
- ZERO duplicate cards ever, across hole cards and board. Track every card dealt internally before assigning the next one. A board card cannot appear in any hand. A hole card cannot appear on the board or in another hand.

## STATISTICAL REALISM — CRITICAL
- Hero flops a pair: ~32% of hands. Hero flops two pair+: ~5%. Hero misses completely: ~63%.
- Set flopping with a pocket pair: ~12%. If hero flopped a set in the last 4 pocket-pair hands, the next pocket pair MUST miss.
- Flush draws complete by river: ~35%. Open-ended straight draws: ~32%. Gutshots: ~17%. Never inflate these.
- Board texture (independent of hero cards): two-tone flops ~55%, monotone ~5%, paired ~17%, connected ~40%. Rainbow flops capped at 45% — if 3 consecutive flops were rainbow, the next MUST be two-tone or monotone.
- Made hand distribution across a session: straights ~4.6%, flushes ~3.0%, full houses ~2.6% by river. If none appeared in 20+ hands, generate a board texture that allows one.
- NEVER bias the board toward hero's hole cards. Do not place an Ace on the flop because hero holds AK. Do not complete a flush because hero holds suited cards. The board is independent of hero's hand. Always.
- ~65% of turns and ~60% of rivers should be blanks that change nothing meaningful. A boring missed flop/turn/river is correct and expected — do not manufacture drama.

## OPPONENT DECISION HIERARCHY
1. EVALUATE HAND STRENGTH: strong (top pair+, 8+ out draw, made hand) / marginal (weak pair, gutshot, overcards) / weak (nothing).
2. HAND STRENGTH OVERRIDES EVERYTHING: strong hands never fold regardless of archetype. Pot committed (40%+ stack in) never folds. Nuts/near-nuts raise or slowplay, never fold. A nit who raises always has a strong hand — no bluffs from nits, ever.
3. MANDATORY HAND CHECK BEFORE ANY CALL OF A RAISE/SHOVE: a player with no pair, no draw, no made hand NEVER calls a raise or shove, regardless of archetype. Calling stations call with weak MADE hands, never complete air. A bluff lead does not justify calling a raise — bluffers fold to raises. Verify explicitly before allowing any call of a raise.
4. FOLDING FREQUENCIES (weak/marginal hands only — strong hands ignore this table):
   Nit: folds to cbet 75%, to 3bet 85%, to 2nd barrel 80%, to river bet 85%
   TAG: 55% / 65% / 60% / 65%
   LAG: 35% / 40% / 35% / 40%
   Calling station: 20% / 30% / 25% / 20%
   Recreational: 45% / 55% / 50% / 55%
   Splashy: 25% / 35% / 30% / 35%
5. BARREL FREQUENCIES (bluffs/thin value only — strong hands always barrel all streets): cbet flop / double barrel turn / triple barrel river —
   Nit 50/30/10, TAG 65/45/25, LAG 75/60/45, Recreational 55/30/15, Calling station 40/25/10, Splashy 70/50/35.
   Modify: hero calls flop → reduce turn barrel 10-15%. Hero calls turn → reduce river barrel 10-15%. Turn card improves hero's perceived range → reduce 15-20%. Board gets wetter → reduce 10%.
6. MULTIWAY POT ADJUSTMENTS: if pot was limped and flop bet < 50% pot, reduce all fold frequencies by 15%. Calling stations fold to small multiway bets only 10% of time, splashy 15%, recreational 30%. Nits/TAGs unaffected.
7. PREFLOP AGGRESSION — 3bet/4bet/5bet total frequency (value+bluff combined) when facing a raise/3bet/4bet respectively, applied ONLY when hand strength supports it per hierarchy above: Nit 12/8/5%, TAG 28/16/10%, LAG 45/25/15%, Recreational 15/7/3%, Calling station 7/3/2%, Splashy 35/20/12%.
8. POSTFLOP RAISE/CHECK-RAISE/RE-RAISE frequencies decrease street by street (most aggressive flop, least river) and follow the same archetype ordering as above (LAG/Splashy most aggressive, Nit/Station least). Never let a nit bluff-raise on any street.
9. FLOAT FREQUENCY (calling a cbet with a weak hand to take it away later): Nit 5%, TAG 15%, LAG 35%, Recreational 10%, Calling station 40%, Splashy 30%. A floater who calls flop typically checks turn, then bets river as a bluff ~60% of time if hero checked back, or folds turn ~65% if hero bet again.
10. Bet sizing: regs use clean sizes, recreationals use odd amounts. Slowplaying valid for strong hands. Max 1 out-of-character play per session.

## HAND EVALUATION — MANDATORY VERIFICATION
Before any debrief or showdown, verify mathematically:
- Kicker implications explicitly (AJ beats AT on Ace-high board because J beats T)
- Two pair rank order (Aces-Nines beats Kings-Nines because top pair compared first)
- Set position verified against ALL THREE board cards (top/middle/bottom set = matching highest/middle/lowest board card)
- Side pots calculated correctly when stacks differ on all-ins

## SEQUENCING — CRITICAL
- A hand is not complete until debrief is delivered. NEVER send a "hand_action" for the next hand in the same response as a "debrief". Debrief screen comes first; wait for next user input before dealing again.

ACTING ORDER — ABSOLUTE RULE, VERIFY BEFORE EVERY RESPONSE:
Preflop acting order: UTG, UTG+1, UTG+2, MP, HJ, CO, BTN, SB, BB (in that exact order, looping back to UTG if action continues).
Postflop acting order: SB, BB, UTG, UTG+1, UTG+2, MP, HJ, CO, BTN (OOP-to-IP order, looping if action continues).
Before outputting the players array, go through the seating order ONE PLAYER AT A TIME starting from the first to act on this street. For each player ask: "has this player's turn happened yet, strictly before hero's turn in this exact order?" If yes, resolve their action. If this player IS hero, output hero with action: null (this is the current decision) and STOP — do not process any further players in the array regardless of their position. Every player listed AFTER hero in seating order for this street must show action: null, with zero exceptions, even if they are folded players from a previous street or seem "obviously" foldable. Do not skip ahead. Do not resolve multiple players out of order. Do not resolve a player whose turn has not arrived yet.
A player who folded on a PREVIOUS street should not appear in the players array at all for subsequent streets — remove folded players from the array entirely once they fold, do not keep showing them with action: "fold" on later streets.
Players still in the hand who simply haven't acted yet on the CURRENT street show action: null, never a guessed or pre-resolved action.

- POSITION LABELS: each player has exactly one fixed position label per hand (SB/BB/UTG/UTG+1/MP/HJ/CO/BTN). Never show combined labels.
- STREET TRANSITIONS: only advance to next street once all active players have acted and matched the bet (or folded/all-in). Deal next card, update board array, reset action to first active player left of dealer (OOP acts first, IP acts last, always).

## POST-HAND DEBRIEF
After every hand (including instant preflop folds) produce debrief_text covering, as plain text with blank lines between sections (use CAPS labels, not markdown):
HAND SUMMARY — one sentence
STREET BY STREET — each street hero acted: action+sizing, verdict (Correct/Marginal/No), 2-4 sentences specific analysis referencing real cards/pot odds/opponent type
WHAT OPPONENTS HELD — only relevant/showdown hands
KEY LEAK THIS HAND — only if applicable, name precisely, reference if recurring this session
ONE THING DONE WELL — only if genuinely good, no manufactured praise

Debrief rules: no hints were given during the hand. Be direct and honest, don't soften mistakes. Verify all hand comparisons mathematically — never assume. Cross-reference session leak history explicitly ("this is the Nth time this session..."). When hero folds a weak hand, assess whether the spot had independent steal/squeeze value, don't just confirm the fold. Evaluate each street independently — a hand can have both a correct and incorrect decision in it, call out each separately (right result/wrong process and vice versa). If hero wins without showdown, still assess whether the play was correct. EV VERIFICATION RULE: before flagging anything as a leak, calculate EV explicitly and show the reasoning — a leak must be demonstrably -EV. Split-pot raises are not automatically leaks. State actual pot odds before calling a call/fold wrong. Check for independent steal value before confirming a fold was simply "correct." If EV is neutral, say so — never manufacture a leak. Max ~350 words in debrief_text.

## LEAK TRACKER
Maintain and return the full running leak_tracker array every single response (table_setup excepted), accumulating across the whole session, even on hands with no new leak (just return the existing array unchanged).

## STACK TRACKING
Track hero_stack and net_result precisely every response. net_result = hero_stack minus total amount ever bought in (starting stack + all rebuys). Never reconstruct from scratch — carry forward precisely from the conversation history.

This is a poker training simulation, not a pure simulation. Hero receives more playable hands than real poker (~80% playable vs ~20-30% real) for maximum learning per session. Frequencies above are calibrated for learning, not pure GTO.

function PlayingCard({ card, placeholder }) {
  if (placeholder) return <div className="play-card placeholder">??</div>;
  if (!card) return null;
  const isRed = card.includes('♦') || card.includes('♥');
  return <div className={`play-card ${isRed ? 'red' : ''}`}>{card}</div>;
}

function fmtMoney(n) {
  if (n === undefined || n === null) return '$0';
  const sign = n < 0 ? '-' : '';
  return sign + '$' + Math.abs(Math.round(n)).toLocaleString();
}

function ActionTag({ action }) {
  if (action === null || action === undefined) return <span className="action-tag pending">—</span>;
  const a = action.toLowerCase();
  let cls = 'fold';
  if (a.includes('call')) cls = 'call';
  else if (a.includes('check')) cls = 'check';
  else if (a.includes('raise') || a.includes('bet') || a.includes('all')) cls = 'bet';
  return <span className={`action-tag ${cls}`}>{action}</span>;
}

function DebriefView({ text }) {
  if (!text) return null;
  // Split on known section labels to bold them
  const labels = ['HAND SUMMARY', 'STREET BY STREET', 'WHAT OPPONENTS HELD', 'KEY LEAK THIS HAND', 'ONE THING DONE WELL'];
  let html = text;
  labels.forEach(l => {
    html = html.split(l).join(`@@${l}@@`);
  });
  const parts = html.split('@@').filter(Boolean);
  return (
    <div className="debrief-body">
      {parts.map((p, i) => {
        if (labels.includes(p)) return <strong key={i}>{p}{'\n'}</strong>;
        return <span key={i}>{p}</span>;
      })}
    </div>
  );
}

function App() {
  const [apiKey, setApiKey] = useState('');
  const [keyInput, setKeyInput] = useState('');
  const [setupError, setSetupError] = useState('');
  const [messages, setMessages] = useState([]); // conversation history for Claude
  const [state, setState] = useState(null); // latest parsed JSON state from Claude
  const [loading, setLoading] = useState(false);
  const [raiseAmount, setRaiseAmount] = useState('');
  const [error, setError] = useState('');
  const scrollRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
  }, [state]);

  const callClaude = useCallback(async (newUserMessage) => {
    setLoading(true);
    setError('');
    const updatedMessages = [...messages, { role: 'user', content: newUserMessage }];
    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 2000,
          system: SYSTEM_PROMPT,
          messages: updatedMessages
        })
      });
      if (!resp.ok) {
        const errBody = await resp.text();
        throw new Error(`API error ${resp.status}: ${errBody.slice(0, 200)}`);
      }
      const data = await resp.json();
      const textBlock = data.content.find(b => b.type === 'text');
      const raw = textBlock ? textBlock.text : '{}';
      let cleaned = raw.trim();
      if (cleaned.startsWith('```')) {
        cleaned = cleaned.replace(/^```(json)?/, '').replace(/```$/, '').trim();
      }
      const parsed = JSON.parse(cleaned);
      setMessages([...updatedMessages, { role: 'assistant', content: raw }]);
      setState(parsed);
    } catch (e) {
      console.error(e);
      setError(e.message || 'Something went wrong talking to Claude.');
    } finally {
      setLoading(false);
    }
  }, [messages, apiKey]);

  const handleStart = () => {
    if (!keyInput.trim().startsWith('sk-ant-')) {
      setSetupError('That doesn\'t look like an Anthropic API key. It should start with sk-ant-');
      return;
    }
    setSetupError('');
    setApiKey(keyInput.trim());
  };

  useEffect(() => {
    if (apiKey && messages.length === 0) {
      callClaude('Deal');
    }
  }, [apiKey]);

  const sendAction = (text) => {
    setRaiseAmount('');
    callClaude(text);
  };

  // ===== SETUP SCREEN =====
  if (!apiKey) {
    return (
      <div className="setup-screen">
        <div className="setup-logo">Riverd</div>
        <div className="setup-tagline">$2/5 · Wynn Las Vegas</div>
        <div className="setup-card">
          <label className="setup-label">Anthropic API Key</label>
          <input
            className="setup-input"
            type="password"
            placeholder="sk-ant-..."
            value={keyInput}
            onChange={e => setKeyInput(e.target.value)}
            autoCapitalize="none"
            autoCorrect="off"
          />
          <div className="setup-note">
            Your key stays in this browser tab only — it's never saved, stored, or sent anywhere except directly to Anthropic's API. Closing this tab clears it completely.
          </div>
          <button className="setup-btn" onClick={handleStart}>Sit down at the table</button>
          {setupError && <div className="setup-error">{setupError}</div>}
        </div>
      </div>
    );
  }

  // ===== MAIN APP =====
  const screen = state?.screen;

  return (
    <div className="app-shell">
      <div className="topbar">
        <div className="topbar-brand">Riverd</div>
        <div className="topbar-stack">
          <span>STACK</span>{state ? fmtMoney(state.hero_stack) : '—'}
        </div>
      </div>

      <div className="scroll-area" ref={scrollRef}>
        {loading && (
          <div className="loading-block">
            <div className="spinner"></div>
            <div>Dealing...</div>
          </div>
        )}

        {error && (
          <div className="debrief-card">
            <div className="debrief-title">Connection issue</div>
            <div className="debrief-body">{error}</div>
          </div>
        )}

        {!loading && state && screen === 'table_setup' && (
          <React.Fragment>
            <div className="hand-banner">
              <div className="hand-banner-num">Table Set</div>
              <div className="hand-banner-meta">Wynn Las Vegas · $2/$5 NL · Tuesday 7pm</div>
            </div>
            <table className="players-table">
              <thead><tr><th>Player</th><th>Stack</th><th>Read</th></tr></thead>
              <tbody>
                {state.players?.map((p, i) => (
                  <tr key={i} className={p.is_hero ? 'hero-row' : ''}>
                    <td>{p.is_hero ? 'You' : p.name} ({p.position})</td>
                    <td className="stack-cell">{fmtMoney(p.stack)}</td>
                    <td className="read-cell">{p.read || ''}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </React.Fragment>
        )}

        {!loading && state && (screen === 'hand_action' || screen === 'table_setup') && state.hero_cards && (
          <React.Fragment>
            <div className="hand-banner">
              <div className="hand-banner-num">Hand {state.hand_number}</div>
            </div>

            <div className="street-block">
              <div className="street-header">
                <div className="street-name">{(state.street || 'preflop').toUpperCase()}</div>
                <div className="street-pot">Pot: {fmtMoney(state.pot)}</div>
              </div>

              <div className="board-row">
                {(state.board && state.board.length > 0) ? state.board.map((c, i) => <PlayingCard key={i} card={c} />) : <div style={{color:'var(--text-dim)', fontSize:13}}>Preflop</div>}
              </div>

              <div className="board-row" style={{marginTop: -6}}>
                {state.hero_cards.map((c, i) => <PlayingCard key={i} card={c} />)}
                <span style={{color:'var(--text-dim)', fontSize:11, alignSelf:'center', marginLeft:4}}>your hand</span>
              </div>

              <div className="action-list">
                {(() => {
                  let heroSeen = false;
                  return state.players?.map((p, i) => {
                    const isHeroRow = p.is_hero;
                    const displayAction = heroSeen && !isHeroRow ? null : p.action;
                    if (isHeroRow) heroSeen = true;
                    return (
                      <div className="action-row" key={i}>
                        <div>
                          <span className={`pname ${p.is_hero ? 'hero' : ''}`}>{p.is_hero ? 'You' : p.name} ({p.position})</span>
                          <span className="pstack">{fmtMoney(p.stack)}</span>
                        </div>
                        <ActionTag action={displayAction} />
                      </div>
                    );
                  });
                })()}
              </div>

              {state.awaiting_hero && (
                <div className="to-call-line">
                  Pot: {fmtMoney(state.pot)} · To call: {fmtMoney(state.to_call)}
                </div>
              )}
            </div>
          </React.Fragment>
        )}

        {!loading && state && screen === 'debrief' && (
          <React.Fragment>
            <div className="session-summary">
              <div className="ss-item">
                <div className="ss-label">Stack</div>
                <div className="ss-val">{fmtMoney(state.hero_stack)}</div>
              </div>
              <div className="ss-item">
                <div className="ss-label">Net</div>
                <div className="ss-val" style={{color: state.net_result >= 0 ? 'var(--green-win)' : 'var(--red)'}}>{fmtMoney(state.net_result)}</div>
              </div>
              <div className="ss-item">
                <div className="ss-label">Hand</div>
                <div className="ss-val">#{state.hand_number}</div>
              </div>
            </div>

            <div className="debrief-card">
              <div className="debrief-title">Debrief</div>
              <DebriefView text={state.debrief_text} />
            </div>

            {state.leak_tracker && state.leak_tracker.length > 0 && (
              <div className="debrief-card">
                <div className="debrief-title" style={{fontSize: 15}}>Session Leak Tracker</div>
                <table className="leak-table">
                  <tbody>
                    {state.leak_tracker.map((l, i) => (
                      <tr key={i}>
                        <td>{l.leak} <span style={{color:'var(--text-dim)', fontSize: 11}}>×{l.occurrences}</span></td>
                        <td>{l.cost}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </React.Fragment>
        )}

        {!loading && state && screen === 'rebuy_prompt' && (
          <div className="debrief-card">
            <div className="debrief-title">You're busted</div>
            <div className="debrief-body">{state.message}</div>
          </div>
        )}

        {!loading && state && state.message && screen !== 'rebuy_prompt' && (
          <div className="api-note">{state.message}</div>
        )}
      </div>

      {!loading && state && (
        <div className="action-bar">
          {screen === 'hand_action' && state.awaiting_hero && (
            <React.Fragment>
              <div className="quick-actions">
                <button className="qa-btn fold" onClick={() => sendAction('Fold')}>Fold</button>
                <button className="qa-btn call" onClick={() => sendAction(state.to_call > 0 ? `Call ${state.to_call}` : 'Check')}>
                  {state.to_call > 0 ? `Call ${fmtMoney(state.to_call)}` : 'Check'}
                </button>
              </div>
              <div className="raise-row">
                <input
                  className="raise-input"
                  type="number"
                  inputMode="numeric"
                  placeholder="Raise to..."
                  value={raiseAmount}
                  onChange={e => setRaiseAmount(e.target.value)}
                />
                <button className="raise-btn" onClick={() => raiseAmount && sendAction(`Raise to ${raiseAmount}`)}>Bet/Raise</button>
              </div>
            </React.Fragment>
          )}

          {screen === 'hand_action' && !state.awaiting_hero && (
            <button className="continue-btn" onClick={() => sendAction('Continue')}>Continue</button>
          )}

          {screen === 'debrief' && (
            <button className="continue-btn" onClick={() => sendAction('Deal')}>Deal next hand</button>
          )}

          {screen === 'table_setup' && (
            <button className="continue-btn" onClick={() => sendAction('Continue')}>Continue</button>
          )}

          {!['hand_action', 'debrief', 'rebuy_prompt', 'table_setup'].includes(screen) && (
            <button className="continue-btn" onClick={() => sendAction('Continue')}>Continue</button>
          )}

          {screen === 'rebuy_prompt' && (
            <div className="raise-row">
              <input
                className="raise-input"
                type="number"
                inputMode="numeric"
                placeholder="Rebuy amount..."
                value={raiseAmount}
                onChange={e => setRaiseAmount(e.target.value)}
              />
              <button className="raise-btn" onClick={() => raiseAmount && sendAction(`Rebuy ${raiseAmount}, deal next hand`)}>Rebuy</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
